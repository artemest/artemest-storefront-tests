name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Ambiente da testare'
        required: true
        default: 'https://artemest.com'
        type: choice
        options:
          - https://artemest.com
          - https://artemeststaging.co/
      test_file:
        description: 'Nome del test senza estensione (es: navigazione-checkout). Lascia vuoto per eseguirli tutti.'
        required: false
        default: ''
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
        run: |
          if [ -n "${{ github.event.inputs.test_file }}" ]; then
            npx playwright test ${{ github.event.inputs.test_file }}
          else
            npx playwright test
          fi
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30